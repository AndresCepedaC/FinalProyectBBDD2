# ===================================================================
# SPRING BOOT - H2 IN-MEMORY DATABASE CONFIGURATION
# QuindioFlix - Perfil DEMO (sin necesidad de Oracle)
# ===================================================================

# H2 en archivo: reproducciones, calificaciones y registros persisten entre reinicios
spring.datasource.url=jdbc:h2:file:./data/quindioflix-demo;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE;MODE=Oracle
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate: actualizar esquema sin borrar datos al cerrar la app
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Semilla cargada por DemoDataSeeder solo si la BD esta vacia
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# Consola H2 habilitada para debugging (acceder en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Desactivar batch processing para H2 (no soportado bien)
spring.jpa.properties.hibernate.jdbc.batch_size=1
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false
spring.jpa.properties.hibernate.jdbc.fetch_size=10
