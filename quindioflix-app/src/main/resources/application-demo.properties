# ===================================================================
# SPRING BOOT - H2 IN-MEMORY DATABASE CONFIGURATION
# QuindioFlix - Perfil DEMO (sin necesidad de Oracle)
# ===================================================================

# Overrides de base de datos para H2
spring.datasource.url=jdbc:h2:mem:quindioflix;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=Oracle
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# Hibernate: crear tablas automaticamente desde las entidades
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Cargar datos semilla despues de crear las tablas
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-h2.sql

# Consola H2 habilitada para debugging (acceder en /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Desactivar batch processing para H2 (no soportado bien)
spring.jpa.properties.hibernate.jdbc.batch_size=1
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false
spring.jpa.properties.hibernate.jdbc.fetch_size=10
