# ===================================================================
# SPRING BOOT - ORACLE DATABASE CONFIGURATION
# QuindioFlix - Proyecto Bases de Datos II
# ===================================================================

# Server config
server.port=8080
spring.application.name=quindioflix

# Database Connection (Oracle)
# Actualizar con las credenciales correctas de la base de datos Oracle
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:XE
spring.datasource.username=QUINDIOFLIX_OWNER
spring.datasource.password=QFlix2024
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# Hibernate Config
# none = No hace cambios en la BD, asume que los scripts SQL ya crearon todo
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Batch processing para mejor rendimiento (inserts masivos)
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Optimizacion Oracle specific
spring.jpa.properties.hibernate.jdbc.fetch_size=100
