<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuindioFlix</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>

    <!-- VISTA: LOGIN -->
    <section id="login-view" class="view active">
        <div class="login-container">
            <h1 class="logo">QuindioFlix</h1>
            <form id="login-form">
                <h2>Iniciar Sesión</h2>
                <div class="input-group">
                    <input type="email" id="email" required placeholder="Correo electrónico">
                </div>
                <div class="input-group">
                    <input type="password" id="password" required placeholder="Contraseña">
                </div>
                <button type="submit" class="btn btn-primary">Entrar</button>
            </form>
        </div>
    </section>

    <!-- VISTA: SELECCIÓN DE PERFIL -->
    <section id="profile-selection-view" class="view hidden">
        <div class="profiles-container">
            <h1>¿Quién está viendo ahora?</h1>
            <div class="profiles-grid" id="profiles-grid">
                <!-- Se inyectaran los perfiles dinamicamente -->
            </div>
            <button id="btn-logout" class="btn btn-secondary mt-2">Cerrar Sesión</button>
        </div>
    </section>

    <!-- VISTA: DASHBOARD / CATÁLOGO -->
    <section id="dashboard-view" class="view hidden">
        <header class="navbar">
            <h1 class="logo">QuindioFlix</h1>
            <nav id="main-nav">
                <div class="current-profile" id="current-profile-display">
                    Perfil
                </div>
                <button id="btn-switch-profile" class="btn btn-text">Cambiar Perfil</button>
            </nav>
        </header>

        <main class="catalog-container">
            <h2>Populares en QuindioFlix</h2>
            <div class="catalog-grid" id="catalog-grid">
                <!-- Se inyectaran los contenidos -->
            </div>
        </main>
    </section>

    <!-- MODAL: DETALLES Y ACCIONES (REPRODUCIR / CALIFICAR) -->
    <div id="content-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="close-modal">&times;</span>
            <h2 id="modal-title">Título</h2>
            <p id="modal-desc">Descripción</p>
            <div class="modal-actions">
                <button id="btn-play" class="btn btn-primary">► Reproducir</button>
            </div>
            
            <div class="rating-section">
                <h3>Calificar este contenido</h3>
                <input type="number" id="rating-stars" min="1" max="5" placeholder="Estrellas (1-5)">
                <textarea id="rating-review" placeholder="Escribe tu reseña..."></textarea>
                <button id="btn-rate" class="btn btn-secondary">Enviar Calificación</button>
            </div>
        </div>
    </div>

    <!-- MODAL: REPORTES (ADMIN) -->
    <div id="reports-modal" class="modal hidden">
        <div class="modal-content admin-reports">
            <span class="close-btn" id="close-reports-modal">&times;</span>
            <h2>Reportes (Vista Materializada)</h2>
            <div class="table-responsive">
                <table id="reports-table">
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Categoría</th>
                            <th>Total Reproducciones</th>
                            <th>Calificación Promedio</th>
                        </tr>
                    </thead>
                    <tbody id="reports-body">
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
